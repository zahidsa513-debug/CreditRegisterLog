name: Final App Ready

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install and Build Web
      run: |
        npm install
        npm run build --if-present

    # ✅ জাভা ২১ সেটআপ (আপনার স্ক্রিনশট ১০০৩৪৫০০৫.jpg এর জন্য প্রয়োজন)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    # ✅ নষ্ট ফাইল ঠিক করা এবং সরাসরি APK বিল্ড করা
    - name: Repair and Build Android
      run: |
        if [ -d "android" ]; then
          cd android
          rm -f gradle/wrapper/gradle-wrapper.jar
          rm -f gradlew
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        else
          echo "Error: No Android folder found!"
          exit 1
        fi

    # ✅ APK ডাউনলোড করার লিংক তৈরি
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: CreditRegister-Final-App
        path: android/app/build/outputs/apk/debug/*.apk
