name: CI/CD Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout source code
    - uses: actions/checkout@v4

    # ✅ Node.js setup
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build --if-present

    # ✅ JDK setup (Java 17 is most compatible for modern Android)
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # ✅ Build Android APK
    - name: Build Android APK
      run: |
        # আপনার রিপোজিটরিতে 'app' নামে ফোল্ডার আছে
        cd app
        chmod +x gradlew
        ./gradlew assembleDebug

    # ✅ Upload APK as Artifact
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: credit-register-apk
        # APK জেনারেট হওয়ার পর এই পাথে পাওয়া যাবে
        path: app/app/build/outputs/apk/debug/*.apk
