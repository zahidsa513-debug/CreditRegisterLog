name: Build Android APK (Java 21)

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install and Build Web
      run: |
        npm install
        npm run build --if-present

    # ✅ জাভা ১৭ এর বদলে জাভা ২১ ব্যবহার করা হচ্ছে (1000345005.jpg এর সমস্যা সমাধানে)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build Android APK
      run: |
        if [ -d "android" ]; then
          cd android
          chmod +x gradlew
          # লিন্ট বা অন্য ছোট এরর এড়াতে বিল্ড কন্টিনিউ করবে
          ./gradlew assembleDebug --no-daemon
        else
          echo "Android folder not found!"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CreditRegister-APK-Java21
        path: android/app/build/outputs/apk/debug/*.apk
