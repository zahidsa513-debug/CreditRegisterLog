name: CI/CD Build & Artifact Download

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm install --legacy-peer-deps
        # এরর ফিক্স করার জন্য আলাদাভাবে ইন্সটল করা হচ্ছে
        npm install prop-types --save-dev --legacy-peer-deps

    - name: Build Web Project
      run: |
        # Vite এরর এড়াতে CI=false ব্যবহার করা হয়েছে
        CI=false npm run build

    - name: Upload Web Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CreditRegister-Web-Build
        path: dist/

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Android Build (APK)
      run: |
        # অ্যান্ড্রয়েড প্ল্যাটফর্ম চেক এবং সিঙ্ক
        npx cap sync
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: CreditRegister-Android-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
