name: CI/CD Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build

    - name: Lint
      run: npm run lint
- name: Upload APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: CreditRegister-Final-Build
          # এখানে নির্দিষ্ট পাথ না দিয়ে পুরো অ্যান্ড্রয়েড ফোল্ডার সার্চ করবে
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
