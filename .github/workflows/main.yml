name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --force

      - name: Build Web Project (Ignoring TS Errors)
        run: |
          CI=false npm run build

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Capacitor and Android Platform
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # অ্যান্ড্রয়েড ফোল্ডার না থাকলে সেটি তৈরি করা এবং প্ল্যাটফর্ম অ্যাড করা
          if [ ! -d "android" ]; then
            npx cap init "CreditRegister" "com.zahidsa.creditreg" --web-dir dist
            npx cap add android
          fi
          npx cap sync android

      - name: Fix Kotlin and Duplicate Classes
        run: |
          echo "subprojects {
              configurations.all {
                  resolutionStrategy {
                      eachDependency { details ->
                          if (details.requested.group == 'org.jetbrains.kotlin') {
                              details.useVersion '1.8.22'
                          }
                      }
                  }
              }
          }" >> android/build.gradle

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CreditRegister-Final-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
