name: CI/CD Build & Artifact Download

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: |
        # ক্লান্তিহীন ডিপেন্ডেন্সি ইনস্টলেশন
        npm install --legacy-peer-deps
        # image_3d85db.png এরর ফিক্স করার জন্য prop-types ইনস্টল
        npm install prop-types --save --legacy-peer-deps
        # Capacitor এবং অন্যান্য প্রয়োজনীয় টুলস
        npm install @capacitor/cli @capacitor/core @capacitor/android --legacy-peer-deps

    - name: Build Web Project
      run: |
        # Vite বিল্ড প্রসেস
        CI=false npm run build

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Android Build (APK)
      run: |
        if [ ! -f "capacitor.config.json" ]; then
          echo '{"appId": "com.zahid.creditregister", "appName": "CreditRegister", "webDir": "dist"}' > capacitor.config.json
        fi

        if [ ! -d "android" ]; then
          ./node_modules/.bin/cap add android
        fi
        
        ./node_modules/.bin/cap sync android
        
        cd android
        
        # ডুপ্লিকেট ক্লাস এবং কোটলিন কনফ্লিক্ট ফিক্স
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "kotlin.stdlib.default.dependency=false" >> gradle.properties
        
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon -x test

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: CreditRegister-Android-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
