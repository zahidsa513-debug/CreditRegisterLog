name: CI/CD Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ✅ Checkout source code
    - uses: actions/checkout@v4

    # ✅ Node.js setup
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build

    - name: Lint
      run: npm run lint

    # ✅ JDK setup (Java 20)
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '20'

    # ✅ Build Android APK (adjust path to your project)
    - name: Build Android APK
      run: |
        cd app
        ./gradlew assembleDebug

    # ✅ Upload APK as Artifact
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: credit-register-apk
        path: app/build/outputs/apk/debug/*.apk
