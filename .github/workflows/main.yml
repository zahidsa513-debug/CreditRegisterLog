- name: Build Web Project
        run: |
          npm run build --if-present
          # নিশ্চিত করুন যে আপনার বিল্ড ফোল্ডারটির নাম 'dist' নাকি 'build'
          # যদি আপনার প্রোজেক্টে build ফোল্ডার তৈরি হয় তবে নিচের কমান্ডটি দিন:
          # npx cap copy android

      - name: Capacitor Sync
        run: |
          # অ্যান্ড্রয়েড প্ল্যাটফর্ম যদি আগে থেকেই থাকে তবে সেটি আপডেট করা
          npx cap sync android
          
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          # প্রজেক্ট ক্লিন করে নতুন করে বিল্ড করা যাতে সব রিসোর্স যুক্ত হয়
          ./gradlew clean assembleDebug --no-daemon
