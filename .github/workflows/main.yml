name: CI/CD Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # ✅ অটোমেটিক Gradle ইন্সটল এবং ফাইল তৈরি করা
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Android APK
      run: |
        # যদি gradlew না থাকে তবে এটি নতুন করে তৈরি করবে
        gradle wrapper
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: credit-register-apk
        path: "**/build/outputs/apk/debug/*.apk"
