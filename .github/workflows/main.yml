name: CI/CD Build & Artifact Download

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm install --legacy-peer-deps
        npm install prop-types --save --legacy-peer-deps
        npm install @capacitor/cli @capacitor/core @capacitor/android --legacy-peer-deps

    - name: Build Web Project
      run: |
        CI=false npm run build

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Android Build (APK)
      run: |
        if [ ! -f "capacitor.config.json" ]; then
          echo '{"appId": "com.zahid.creditregister", "appName": "CreditRegister", "webDir": "dist"}' > capacitor.config.json
        fi

        if [ ! -d "android" ]; then
          ./node_modules/.bin/cap add android
        fi
        
        ./node_modules/.bin/cap sync android
        
        cd android
        
        # ডুপ্লিকেট ক্লাস এরর চিরতরে দূর করার কমান্ড
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        # এটি কোটলিন লাইব্রেরির কনফ্লিক্ট বন্ধ করবে
        echo "kotlin.stdlib.default.dependency=false" >> gradle.properties
        
        # বিল্ড গ্র্যাডলে ফোর্স কনফিগারেশন যোগ করা
        sed -i '/configurations.all {/a \        resolutionStrategy.force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22"' app/build.gradle
        
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon -x test
        
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: CreditRegister-Android-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
