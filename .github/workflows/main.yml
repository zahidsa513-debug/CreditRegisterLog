name: CI/CD Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # ✅ এই স্টেপটি gradlew খুঁজে বের করবে এবং বিল্ড করবে
    - name: Build Android APK
      run: |
        # gradlew ফাইলটি কোথায় আছে তা খোঁজা হচ্ছে
        GRADLEW_PATH=$(find . -name gradlew | head -n 1)
        
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Error: gradlew file not found! Please ensure your Android project files are pushed to GitHub."
          exit 1
        fi
        
        # ফাইলটির ডিরেক্টরিতে যাওয়া
        GRADLEW_DIR=$(dirname "$GRADLEW_PATH")
        cd "$GRADLEW_DIR"
        
        echo "Found gradlew in $GRADLEW_DIR. Starting build..."
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: credit-register-apk
        path: "**/build/outputs/apk/debug/*.apk"
