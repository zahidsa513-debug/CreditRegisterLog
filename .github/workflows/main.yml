name: Build Android APK (Final Error Fix)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web Project
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Initialize Capacitor Cloud
        run: |
          npx cap init "CreditRegister" "com.creditregister.app" --web-dir dist
          npx cap add android || true
          npx cap sync android

      # ডুপ্লিকেট ক্লাস এবং গ্র্যাডল এরর সমাধানের জন্য চূড়ান্ত কনফিগারেশন
      - name: Advanced Gradle Fix
        run: |
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "kotlin.stdlib.default.dependency=false" >> android/gradle.properties
          
          # বিল্ড স্ক্রিপ্টে কাস্টম রেজোলিউশন যোগ করা যাতে ডুপ্লিকেট ক্লাস না আসে
          sed -i '/dependencies {/a \    implementation(platform("org.jetbrains.kotlin:kotlin-bom:1.9.0"))' android/app/build.gradle

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
- name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CreditRegister-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
