name: Generate Build Files

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: my-app-files
          path: dist/

      # ✅ Convert PWA build into APK using bubblewrap
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate APK from PWA
        run: |
          bubblewrap init --manifest dist/manifest.json
          bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pwa-apk
          path: build/app-release.apk
