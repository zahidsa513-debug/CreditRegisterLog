name: Build and Upload APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web Project
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Initialize Capacitor
        run: |
          npx cap init "CreditRegister" "com.creditregister.app" --web-dir dist
          npx cap add android || true
          npx cap sync android

      - name: Configure Gradle
        run: |
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "kotlin.stdlib.default.dependency=false" >> android/gradle.properties
          sed -i '/dependencies {/a \    implementation(platform("org.jetbrains.kotlin:kotlin-bom:1.9.0"))' android/app/build.gradle

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      # এটি আপনার এপিকে সরাসরি Actions ট্যাবে পাঠিয়ে দিবে
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CreditRegister-APK
          path: android/app/build/outputs/apk/release/*.apk
