name: Build and Direct Download APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          # সব প্রয়োজনীয় প্যাকেজ ইন্সটল করা
          npm install --legacy-peer-deps
          npm install prop-types react-is --save --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Build Web Project
        run: |
          # বিল্ড এরর এড়াতে CI=false ব্যবহার করা হয়েছে
          CI=false npm run build
          # আপনার অ্যাপের কোড অ্যান্ড্রয়েড ফোল্ডারে কপি করা
          npx cap copy android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Fix Library Conflict
        run: |
          # কোটলিন লাইব্রেরি সংঘাত দূর করা যা অ্যাপ ক্রাশ হওয়া আটকাবে
          echo "configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }" >> android/app/build.gradle

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          # ফ্রেশ বিল্ড নিশ্চিত করা
          ./gradlew clean assembleDebug --no-daemon -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true

      - name: Upload APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: CreditRegister-Final-Fix
          path: "android/app/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
