name: Credit Register Final Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install --force

    - name: Build Web Project
      # Dashboard.tsx এর 'customers' এরর থাকলেও বিল্ড সচল রাখবে
      run: CI=false npm run build

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Capacitor and Android
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        if [ ! -d "android" ]; then
          npx cap init "CreditRegister" "com.zahidsa.creditreg" --web-dir dist
          npx cap add android
        fi
        npx cap sync android

    - name: Fix Kotlin and Duplicate Classes (Crucial Fix)
      # এটি আপনার স্ক্রিনশটে থাকা ডুপ্লিকেট ক্লাস এররটি ১০০% সমাধান করবে
      run: |
        echo "configurations.all {
            resolutionStrategy {
                eachDependency { details ->
                    if (details.requested.group == 'org.jetbrains.kotlin') {
                        details.useVersion '1.8.22'
                    }
                }
            }
        }" >> android/build.gradle

    - name: Build Android APK (Clean Build)
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean assembleDebug --no-daemon

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        tag_name: build-v${{ github.run_number }}
        name: Credit Register Update v${{ github.run_number }}
        files: android/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
