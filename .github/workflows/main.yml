name: Node.js CI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ✅ কোড চেকআউট করা
    - uses: actions/checkout@v4

    # ✅ Node.js সেটআপ করা
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    # ✅ ডিপেন্ডেন্সি ইন্সটল করা
    - name: Install dependencies
      run: npm install

    # ✅ প্রোজেক্ট বিল্ড করা (যদি আপনার package.json-এ build স্ক্রিপ্ট থাকে)
    - name: Build Project
      run: npm run build --if-present

    # ✅ লিন্ট বা টেস্ট রান করা
    - name: Run Lint
      run: npm run lint --if-present

    # ✅ বিল্ড করা ফাইলগুলো সেভ করা (যেমন: dist বা build ফোল্ডার)
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: web-build-files
        path: |
          dist/
          build/
          public/
