name: CI/CD Build & Artifact Download

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: |
        npm install --legacy-peer-deps
        npm install @capacitor/cli @capacitor/core @capacitor/android prop-types --legacy-peer-deps

    - name: Build Web Project
      run: |
        CI=false npm run build

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Android Build (APK)
      run: |
        # অ্যান্ড্রয়েড ফোল্ডার নতুন করে তৈরি করা (image_3cbb02.png এর এরর ফিক্স)
        rm -rf android
        npx cap add android
        npx cap sync android
        
        cd android
        
        # ডুপ্লিকেট ক্লাস এবং কোটলিন কনফ্লিক্ট ফিক্স
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "kotlin.stdlib.default.dependency=false" >> gradle.properties
        
        # প্যাকেজিং অপশন যোগ করা যাতে ডুপ্লিকেট ফাইল এরর না আসে
        sed -i '/android {/a \    packagingOptions { pickFirst "META-INF/kotlin-stdlib.kotlin_module"; pickFirst "META-INF/kotlin-stdlib-jdk8.kotlin_module"; pickFirst "META-INF/kotlin-stdlib-jdk7.kotlin_module" }' app/build.gradle

        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon -x test

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: CreditRegister-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
