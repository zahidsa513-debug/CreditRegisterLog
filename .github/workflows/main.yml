name: Ultimate APK Build Fix

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install and Build Web
      run: |
        npm install
        npm run build --if-present

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    # ✅ নষ্ট ফাইলটি মুছে নতুন করে জেনারেট করার স্টেপ (1000345007.jpg ফিক্স)
    - name: Repair Gradle and Build
      run: |
        if [ -d "android" ]; then
          cd android
          # নষ্ট জার ফাইল এবং স্ক্রিপ্ট মুছে ফেলা হচ্ছে
          rm -rf gradle/wrapper/gradle-wrapper.jar
          rm -rf gradlew
          
          # সিস্টেমের ডিফল্ট গ্রেডল ব্যবহার করে নতুন র‍্যাপার তৈরি
          gradle wrapper
          
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        else
          echo "Android folder not found!"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CreditRegister-Final-APK
        path: android/app/build/outputs/apk/debug/*.apk
