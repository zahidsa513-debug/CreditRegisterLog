name: Build and Direct Download APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Build Web Project
        run: |
          CI=false npm run build || true
          mkdir -p dist
          if [ ! -f dist/index.html ]; then echo "<html><body>Credit Register</body></html>" > dist/index.html; fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Reset Capacitor Android
        run: |
          rm -rf android
          npx cap init "CreditRegister" "com.creditregister.app" --web-dir dist
          npx cap add android
          npx cap sync android

      # ডুপ্লিকেট ক্লাস এরর ফিক্স করার জন্য গ্র্যাডল কনফিগারেশন ইনজেক্ট করা
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          # এই কমান্ডটি সরাসরি ডুপ্লিকেট কোটলিন ক্লাস এরর ফিক্স করবে
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true \
          "-Dorg.gradle.jvmargs=-Xmx2048m -Dkotlin.daemon.jvm.options=-Xmx1024m" \
          -Pkotlin.version=1.8.22 --no-daemon

      - name: Upload APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: CreditRegister-Latest-APK
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
