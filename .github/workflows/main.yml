name: Fix and Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install and Build Web
      run: |
        npm install
        npm run build --if-present

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # ✅ নষ্ট Gradle ফাইল ঠিক করা এবং বিল্ড করা
    - name: Build Android APK
      run: |
        if [ -d "android" ]; then
          cd android
          # করাপ্টেড ফাইলগুলো মুছে ফেলা হচ্ছে
          rm -f gradle/wrapper/gradle-wrapper.jar
          rm -f gradlew
          
          # নতুন করে Gradle Wrapper তৈরি করা
          gradle wrapper
          
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "Android folder not found!"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CreditRegister-Fixed-APK
        path: android/app/build/outputs/apk/debug/*.apk
