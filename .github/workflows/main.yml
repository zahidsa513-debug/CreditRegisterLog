name: CI/CD Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    # ✅ Expo প্রজেক্ট হলে android ফোল্ডার জেনারেট করা
    - name: Prebuild Android (If Expo)
      run: npx expo prebuild --platform android --no-install || echo "Not an expo project, skipping prebuild"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build Android APK
      run: |
        # অ্যান্ড্রয়েড ফোল্ডারে ঢোকার চেষ্টা করা
        if [ -d "android" ]; then
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        elif [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "Error: Could not find android folder or gradlew file. Please check your project structure."
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: credit-register-apk
        path: "**/*.apk"
