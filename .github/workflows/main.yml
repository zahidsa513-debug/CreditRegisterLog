name: CI/CD Build & Artifact Download

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: |
        npm install --legacy-peer-deps
        npm install @capacitor/cli @capacitor/core @capacitor/android prop-types --legacy-peer-deps

    - name: Build Web Project
      run: |
        CI=false npm run build

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Android Build (APK)
      run: |
        # কনফিগারেশন চেক
        if [ ! -f "capacitor.config.json" ]; then
          echo '{"appId": "com.zahid.creditregister", "appName": "CreditRegister", "webDir": "dist"}' > capacitor.config.json
        fi

        # অ্যান্ড্রয়েড প্ল্যাটফর্ম রি-ফ্রেশ
        rm -rf android
        npx cap add android
        npx cap sync android
        
        cd android
        
        # ডুপ্লিকেট ক্লাস এরর চিরতরে বন্ধ করার মাস্টার কমান্ড
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        
        # বিল্ড ফাইলে ফোর্স ডুপ্লিকেট রিমুভাল কনফিগারেশন যোগ করা
        sed -i '/android {/a \    configurations.all { resolutionStrategy.force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22" }' app/build.gradle
        sed -i '/android {/a \    packagingOptions { pickFirst "**/*.kotlin_module"; pickFirst "**/*.version"; pickFirst "META-INF/AL2.0"; pickFirst "META-INF/LGPL2.1" }' app/build.gradle

        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon -x test

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: CreditRegister-Final-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
