name: Build and Direct Download APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm install prop-types react-is --save --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Build Web Project
        run: |
          CI=false npm run build
          # যদি অ্যান্ড্রয়েড প্ল্যাটফর্ম না থাকে, তবে আইডি সহ যোগ করা
          if [ ! -d "android" ]; then
            npx cap add android --app-id "com.zahid.creditregister" --app-name "CreditRegister"
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Capacitor Sync
        run: |
          # কনফিগ ছাড়াই যাতে সিঙ্ক হয় এবং ফাইল কপি হয়
          npx cap sync android
          npx cap copy android

      - name: Fix Library Conflict
        run: |
          # অ্যাপ ক্রাশ হওয়া আটকাতে
          echo "configurations.all {
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }" >> android/app/build.gradle

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true

      - name: Upload APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: CreditRegister-Success-Build
          path: "android/app/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
