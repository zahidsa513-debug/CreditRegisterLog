name: CI/CD Build & Artifact Download

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm install --legacy-peer-deps
        # Capacitor CLI এবং অ্যান্ড্রয়েড প্ল্যাটফর্ম লোকালি ইনস্টল নিশ্চিত করা
        npm install @capacitor/cli @capacitor/core @capacitor/android --legacy-peer-deps

    - name: Build Web Project
      run: |
        CI=false npm run build

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Android Build (APK)
      run: |
        # কনফিগারেশন ফাইল চেক
        if [ ! -f "capacitor.config.json" ]; then
          echo '{"appId": "com.zahid.creditregister", "appName": "CreditRegister", "webDir": "dist"}' > capacitor.config.json
        fi

        # অ্যান্ড্রয়েড ফোল্ডার চেক
        if [ ! -d "android" ]; then
          ./node_modules/.bin/cap add android
        fi
        
        # সরাসরি পাথ ব্যবহার করে সিঙ্ক করা (executable error এড়াতে)
        ./node_modules/.bin/cap sync android
        
        cd android
        
        # ডুপ্লিকেট ক্লাস এরর ফিক্স
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "kotlin.stdlib.default.dependency=false" >> gradle.properties
        
        chmod +x gradlew
        # এপিকে জেনারেট করা
        ./gradlew assembleDebug --no-daemon -x test
