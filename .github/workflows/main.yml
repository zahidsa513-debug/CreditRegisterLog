name: CI/CD Build & Artifact Download

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: |
        npm install --legacy-peer-deps
        npm install @capacitor/cli @capacitor/core @capacitor/android prop-types --legacy-peer-deps

    - name: Build Web Project
      run: |
        CI=false npm run build

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Android Build (APK)
      run: |
        # কনফিগারেশন চেক
        if [ ! -f "capacitor.config.json" ]; then
          echo '{"appId": "com.zahid.creditregister", "appName": "CreditRegister", "webDir": "dist"}' > capacitor.config.json
        fi

        # অ্যান্ড্রয়েড প্ল্যাটফর্ম ফ্রেশ সেটআপ
        rm -rf android
        npx cap add android
        npx cap sync android
        
        cd android
        
        # ১. গ্র্যাডল প্রোপার্টিজ ফিক্স
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "kotlin.stdlib.default.dependency=false" >> gradle.properties
        
        # ২. ডুপ্লিকেট ক্লাস রিমুভ করার জন্য অ্যাপ লেভেল বিল্ড ফাইলে পরিবর্তন
        # এটি image_3c3f9c.png এর এররগুলো সরাসরি বাইপাস করবে
        sed -i '/dependencies {/i configurations.all { resolutionStrategy { force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22" \n force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22" } }' app/build.gradle
        
        # ৩. প্যাকেজিং অপশন যা ফাইলগুলোকে ফিল্টার করবে
        sed -i '/android {/a \    packagingOptions { \n        resources { \n            pickFirsts.add("**/*.kotlin_module") \n            excludes.add("META-INF/kotlin-stdlib-jdk7.kotlin_module") \n            excludes.add("META-INF/kotlin-stdlib-jdk8.kotlin_module") \n            excludes.add("META-INF/kotlin-stdlib.kotlin_module") \n        } \n    }' app/build.gradle

        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon -x test

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: CreditRegister-Final-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
