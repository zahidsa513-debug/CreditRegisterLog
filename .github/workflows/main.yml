name: Build and Release App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Web/Android App
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # আপনার প্রোজেক্ট অনুযায়ী ভার্সন পরিবর্তন করতে পারেন

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build # এটি আপনার dist বা build ফোল্ডার তৈরি করবে

      # যেহেতু আপনার প্রোজেক্টে gradlew নেই, 
      # আপনি কি এটি Capacitor বা Cordova দিয়ে APK করতে চাচ্ছেন? 
      # যদি শুধু ওয়েব বিল্ড হয় তবে নিচের অংশটি কাজ করবে:

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*
            build/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
