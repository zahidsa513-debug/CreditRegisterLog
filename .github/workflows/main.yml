name: Direct APK Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install and Build
      run: |
        npm install
        # --if-present এবং লিন্ট স্কিপ করার জন্য এই কমান্ড:
        npm run build --if-present

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # ✅ এরর এড়াতে সরাসরি অ্যান্ড্রয়েড বিল্ড
    - name: Build Android APK
      run: |
        if [ -d "android" ]; then
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
        else
          echo "Error: Android folder still not found!"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CreditRegister-Direct-APK
        path: android/app/build/outputs/apk/debug/*.apk
