name: CI/CD Build and APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ✅ ১. কোড ডাউনলোড করা
    - uses: actions/checkout@v4

    # ✅ ২. Node.js সেটআপ (React Build এর জন্য)
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    # ✅ ৩. ডিপেন্ডেন্সি ইন্সটল এবং ওয়েব বিল্ড তৈরি
    - name: Install and Build Web
      run: |
        npm install
        npm run build --if-present

    # ✅ ৪. JDK সেটআপ (অ্যান্ড্রয়েড বিল্ডের জন্য)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # ✅ ৫. অ্যান্ড্রয়েড বিল্ড রান করা
    - name: Build Android APK
      run: |
        # যদি আপনার প্রোজেক্টে ক্যাপাসিটর বা করডোভা থাকে তবে এটি কাজ করবে
        # যদি না থাকে তবে এটি অন্তত ওয়েব বিল্ড ফাইলগুলো সেভ করবে
        if [ -d "android" ]; then
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "No android folder found. Saving web build instead."
        fi

    # ✅ ৬. APK ফাইলটি ডাউনলোড করার জন্য আপলোড করা
    - name: Download APK from here
      uses: actions/upload-artifact@v4
      with:
        name: CreditRegister-APK
        path: |
          **/build/outputs/apk/debug/*.apk
          dist/
          build/
