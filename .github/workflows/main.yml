name: CI/CD Build & Artifact Download

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: |
        npm install --legacy-peer-deps
        npm install @capacitor/cli @capacitor/core @capacitor/android prop-types --legacy-peer-deps

    - name: Build Web Project
      run: |
        CI=false npm run build

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Android Build (APK)
      run: |
        # ১. কনফিগারেশন অটো-জেনারেশন
        if [ ! -f "capacitor.config.json" ]; then
          echo '{"appId": "com.zahid.creditregister", "appName": "CreditRegister", "webDir": "dist"}' > capacitor.config.json
        fi

        # ২. অ্যান্ড্রয়েড এনভায়রনমেন্ট ক্লিন আপ
        rm -rf android
        npx cap add android
        npx cap sync android
        
        cd android
        
        # ৩. গ্র্যাডলে ডুপ্লিকেট ক্লাস রিমুভ করার মাস্টার কমান্ড
        echo "android.useAndroidX=true" >> gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "kotlin.stdlib.default.dependency=false" >> gradle.properties
        
        # ৪. এরর বাইপাস করার জন্য বিল্ড ফাইল মডিফিকেশন
        # এটি কোড লেভেলে সব সংঘাতপূর্ণ ফাইলগুলোকে বাদ দিবে
        sed -i '/android {/a \    packagingOptions { \n        pickFirst "**/*.kotlin_module" \n        pickFirst "META-INF/AL2.0" \n        pickFirst "META-INF/LGPL2.1" \n        exclude "META-INF/kotlin-stdlib-jdk8.kotlin_module" \n        exclude "META-INF/kotlin-stdlib-jdk7.kotlin_module" \n    }' app/build.gradle
        
        # ৫. লাইব্রেরি রেজোলিউশন এনফোর্স করা
        sed -i '/android {/a \    configurations.all { resolutionStrategy.force "org.jetbrains.kotlin:kotlin-stdlib:1.8.22" }' app/build.gradle

        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon -x test

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: CreditRegister-Final-Build
        path: android/app/build/outputs/apk/debug/app-debug.apk
