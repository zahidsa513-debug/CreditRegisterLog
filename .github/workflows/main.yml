name: Build and Release Final APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install --force

    - name: Build Web Project (Latest Update)
      # CI=false নিশ্চিত করে যে ছোটখাটো এরর থাকলেও নতুন কোডটি বিল্ড হবে
      run: CI=false npm run build

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Capacitor and Sync
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        # যদি অ্যান্ড্রয়েড ফোল্ডার না থাকে তবে নতুন করে তৈরি করবে
        if [ ! -d "android" ]; then
          npx cap init "CreditRegister" "com.zahidsa.creditreg" --web-dir dist
          npx cap add android
        fi
        # নতু্ন কোড অ্যান্ড্রয়েড ফোল্ডারে কপি করার জন্য সিঙ্ক
        npx cap sync android

    - name: Build Android APK (Clean Build)
      run: |
        cd android
        chmod +x gradlew
        # clean কমান্ডটি পুরনো সব ক্যাশ মুছে ফেলে একদম নতুন বিল্ড নিশ্চিত করে
        ./gradlew clean assembleDebug

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        tag_name: v2.0.${{ github.run_number }}
        name: Credit Register Update v2.0.${{ github.run_number }}
        files: android/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
